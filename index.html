

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Solar System</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1 id="head">Solar System Weight Calculator</h1>
    </header>

    <main>
        <section class="input_field">
            <input type="text" placeholder="mass in kilogram" id="kgInput">

            <select id="dropdown">
                <option value="" disabled selected hidden>-- select planet --</option>
                <option value="0">Mercury</option>
                <option value="1">Venus</option>
                <option value="2">Earth</option>
                <option value="3">Mars</option>
                <option value="4">Jupiter</option>
                <option value="5">Saturn</option>
                <option value="6">Uranus</option>
                <option value="7">Neptune</option>
            </select>

            <button id="calBtn">Calculate Weight</button>
        </section>

        <section class="content">
            
        </section>
        
    </main>
	<script type="module" src="js/index.js"></script>
</body>
</html>
